<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play | Origin Guess!</title>

  <link rel="stylesheet" href="game.css">
</head>

<body>

  <!-- HEADER -->
  <header class="game-header">
    <a href="index.html">
      <img src="home.png" class="home-btn" alt="Home">
    </a>
    <img src="LOGO.jpg" class="header-logo" alt="Origin Guess">
  </header>

  <!-- GAME AREA -->
  <div class="game-container">

    <h1>Origin Guess!</h1>
    <p class="round">Round <span id="round">1</span> / 10</p>

    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <div class="image-box">
      <img id="game-image" src="" alt="Guess Image">
    </div>

    <div class="guess-buttons">
      <button onclick="guess('ai')">AI Generated</button>
      <button onclick="guess('real')">Real Image</button>
    </div>

    <div id="feedback" class="feedback hidden">
      <p id="feedback-text"></p>
      <button onclick="nextRound()">Next</button>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>Origin Guess, 2026</p>

    <p class="source-link">
      Want to know where we got these images?
      <a href="about.html">Click here</a>
      <a href="privacy.html">Privacy Policy</a>
    </p>
  </footer>

  <!-- GAME LOGIC -->
  <script src="game.js"></script>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where,
      updateDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    console.log("🔥 Firebase loaded");

const firebaseConfig = {
  apiKey: "AIzaSyC2xDqm_y9ByyFZKKed5qQhY28iA5YyDjE",
  authDomain: "origin-guess-leader.firebaseapp.com",
  projectId: "origin-guess-leader",
  storageBucket: "origin-guess-leader.firebasestorage.app",
  messagingSenderId: "1030802873373",
  appId: "1:1030802873373:web:9f66250bf4b562f6a7baf4",
  measurementId: "G-DVN6X5P07N"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // PLAYER ID (persistent)
    let playerId = localStorage.getItem("playerId");

    if (!playerId) {
      playerId = "player_" + Math.floor(Math.random() * 1000000);
      localStorage.setItem("playerId", playerId);
    }

async function submitScore(username, newScore) {
  const leaderboardRef = collection(db, "leaderboard");

  const q = query(leaderboardRef, where("username", "==", username));
  const querySnapshot = await getDocs(q);

  if (!querySnapshot.empty) {
    querySnapshot.forEach(async (document) => {
      const docRef = doc(db, "leaderboard", document.id);
      const oldScore = document.data().score;

      await updateDoc(docRef, {
        score: oldScore + newScore
      });
    });
  } else {
    await addDoc(leaderboardRef, {
      username: username,
      score: newScore,
      created: Date.now()
    });
  }
}

    // make available globally
    window.submitScore = submitScore;
  </script>

</body>
</html>
