<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | Origin Guess!</title>
  <link rel="stylesheet" href="game.css">

  <style>
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    .popup.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <header class="game-header">
    <a href="index.html">
      <img src="home.png" class="home-btn" alt="Home">
    </a>
    <img src="LOGO.jpg" class="header-logo" alt="Origin Guess">
  </header>

  <div id="name-popup" class="popup hidden">
    <div class="popup-content">
      <h2>Enter a Username</h2>

      <p style="font-size:14px; margin-bottom:10px;">
        Please do NOT use your real name for privacy.
      </p>

      <input type="text" id="username-input" placeholder="Enter username">

      <p id="error-message" style="color:red; font-size:14px;"></p>

      <button id="submit-name">Submit</button>
    </div>
  </div>

  <div class="game-container">
    <h1>Leaderboard</h1>
    <div id="leaderboard">
      <p>Loading...</p>
    </div>
  </div>

  <footer>
    <p>Origin Guess, 2026</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  orderBy, 
  limit,
  addDoc,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2xDqm_y9ByyFZKKed5qQhY28iA5YyDjE",
      authDomain: "origin-guess-leader.firebaseapp.com",
      projectId: "origin-guess-leader",
      storageBucket: "origin-guess-leader.firebasestorage.app",
      messagingSenderId: "1030802873373",
      appId: "1:1030802873373:web:9f66250bf4b562f6a7baf4",
      measurementId: "G-DVN6X5P07N"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadLeaderboard() {
      console.log("📊 Loading leaderboard...");

      const leaderboardDiv = document.getElementById("leaderboard");
      const username = localStorage.getItem("username");
      const lastScore = localStorage.getItem("lastScore");

      if (!username && lastScore) {
        document.getElementById("name-popup").classList.remove("hidden");
        leaderboardDiv.innerHTML = "<p>Waiting for username...</p>";
        return;
      }

      try {
        const q = query(
          collection(db, "leaderboard"),
          orderBy("score", "desc"),
          limit(25)
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          leaderboardDiv.innerHTML = "<p>No scores yet 😢</p>";
          return;
        }

        leaderboardDiv.innerHTML = "";

        let rank = 1;

        querySnapshot.forEach((doc) => {
          const data = doc.data();

          leaderboardDiv.innerHTML += `
            <p>#${rank} — ${data.username}: ${data.score}</p>
          `;

          rank++;
        });

      } catch (error) {
        console.error("Error:", error);
        leaderboardDiv.innerHTML = "<p>Error loading leaderboard 😭</p>";
      }
    }

    // ✅ FIXED: WAIT FOR DOM BEFORE ADDING EVENT
    window.addEventListener("DOMContentLoaded", () => {

  // ✅ attach button FIRST
  document.getElementById("submit-name").addEventListener("click", async () => {

    try {

      const input = document.getElementById("username-input").value.trim();
      const errorMsg = document.getElementById("error-message");

      if (!input) {
        errorMsg.textContent = "Please enter a username.";
        return;
      }

      const leaderboardRef = collection(db, "leaderboard");

      const q = query(leaderboardRef, where("username", "==", input));
      const snapshot = await getDocs(q);

      if (!snapshot.empty) {
        errorMsg.textContent = "Username already taken. Try another.";
        return;
      }

      localStorage.setItem("username", input);

      const score = parseInt(localStorage.getItem("lastScore")) || 0;

      await addDoc(leaderboardRef, {
        username: input,
        score: score,
        created: Date.now()
      });

      document.getElementById("name-popup").classList.add("hidden");

      loadLeaderboard();

    } catch (error) {
      console.error("SUBMIT ERROR:", error);
    }

  });

  // ✅ THEN load leaderboard AFTER listener exists
  loadLeaderboard();

});

      // also load leaderboard AFTER DOM is ready
      loadLeaderboard();

    });
  </script>

</body>
</html>
