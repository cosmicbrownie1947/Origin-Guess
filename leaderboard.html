<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Origin Guess!</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="game-header">
  <a href="index.html">
    <img src="home.png" class="home-btn">
  </a>
  <img src="LOGO.jpg" class="header-logo">
</header>

<div id="name-popup" class="popup hidden">
  <div class="popup-content">
    <h2>Enter a Username</h2>
    <input type="text" id="username-input" placeholder="Enter username">
    <p id="error-message"></p>
    <button id="submit-name">Submit</button>
  </div>
</div>

<div class="game-container">
  <h1>Leaderboard</h1>

  <button id="play-again">Play Again</button>

  <div id="leaderboard">
    <p>Loading...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  orderBy, 
  limit,
  addDoc,
  where,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "origin-guess-leader.firebaseapp.com",
  projectId: "origin-guess-leader",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🏆 LOAD LEADERBOARD
async function loadLeaderboard() {
  const leaderboardDiv = document.getElementById("leaderboard");
  const currentUser = localStorage.getItem("username");

  const q = query(
    collection(db, "leaderboard"),
    orderBy("score", "desc"),
    limit(25)
  );

  const snapshot = await getDocs(q);

  leaderboardDiv.innerHTML = "";

  let rank = 1;

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    let medal = "";
    if (rank === 1) medal = "gold";
    else if (rank === 2) medal = "silver";
    else if (rank === 3) medal = "bronze";

    const isUser = data.username === currentUser;

    leaderboardDiv.innerHTML += `
      <div class="leaderboard-item ${medal} ${isUser ? "you" : ""}">
        <span>#${rank}</span>
        <span>${data.username}</span>
        <span>${data.score}</span>
      </div>
    `;

    rank++;
  });
}

// 🚀 MAIN
window.addEventListener("DOMContentLoaded", async () => {

  const username = localStorage.getItem("username");
  const lastScore = parseInt(localStorage.getItem("lastScore")) || 0;

  const leaderboardRef = collection(db, "leaderboard");

  // 🔥 AUTO UPDATE SCORE (THIS FIXES YOUR PROBLEM)
  if (username && lastScore > 0) {
    console.log("⚡ Auto updating score...");

    const q = query(leaderboardRef, where("username", "==", username));
    const snapshot = await getDocs(q);

    if (!snapshot.empty) {
      const docSnap = snapshot.docs[0];
      const docRef = docSnap.ref;

      const currentScore = docSnap.data().score || 0;
      const newTotal = currentScore + lastScore;

      console.log("📊 Auto Add:", currentScore, "+", lastScore, "=", newTotal);

      await updateDoc(docRef, {
        score: newTotal
      });
    }

    // reset score so it doesn't double add
    localStorage.setItem("lastScore", 0);
  }

  // 🧠 SHOW POPUP ONLY IF USER DOESN’T EXIST
  if (!username && lastScore > 0) {
    document.getElementById("name-popup").classList.remove("hidden");
  }

  // 🧠 SUBMIT USERNAME (first-time users)
  document.getElementById("submit-name").addEventListener("click", async () => {

    const input = document.getElementById("username-input").value.trim();
    if (!input) return;

    localStorage.setItem("username", input);

    const scoreToAdd = parseInt(localStorage.getItem("lastScore")) || 0;

    console.log("👤 Creating new user with score:", scoreToAdd);

    await addDoc(leaderboardRef, {
      username: input,
      score: scoreToAdd,
      created: Date.now()
    });

    localStorage.setItem("lastScore", 0);

    document.getElementById("name-popup").style.display = "none";

    loadLeaderboard();
  });

  // 🔁 PLAY AGAIN BUTTON
  document.getElementById("play-again").addEventListener("click", () => {
    document.body.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 400);
  });

  // initial load
  loadLeaderboard();
});
</script>
</body>
</html>
