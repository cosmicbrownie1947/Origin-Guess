<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Origin Guess!</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="logo-box">
        <img src="LOGO.jpg" alt="Origin Guess Logo">
    </div>

    <p class="tagline">10 rounds. AI or Real.
    Can you spot the OG?</p>

    <div class="divider"></div>
    
    <div class="buttons">

        <button id="play-btn" class="btn play">PLAY NOW</button>

        <a href="leaderboard.html" class="btn">Leaderboard</a>

        <a href="learn.html" class="btn">Learn About AI</a>

        <a href="about.html" class="btn">About</a>

    </div>

</div>

<div id="difficulty-menu" class="hidden">

<h2>Select Difficulty</h2>

<div class="difficulty-buttons">

<a href="game.html?difficulty=easy" class="btn">Easy</a>

<a href="game.html?difficulty=medium" class="btn">Medium</a>

<a href="game.html?difficulty=hard" class="btn">Hard</a>

</div>

<script>

const playBtn = document.getElementById("play-btn");
const buttons = document.querySelector(".buttons");
const difficultyMenu = document.getElementById("difficulty-menu");

playBtn.addEventListener("click", () => {

buttons.classList.add("fade-out");

setTimeout(() => {

buttons.style.display = "none";

difficultyMenu.classList.remove("hidden");
difficultyMenu.classList.add("fade-in");

}, 400);

});

</script>

</div>

<footer>
Origin Guess, 2026
</footer>

</body>
</html>
