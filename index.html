<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Origin Guess!</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container" id="main-container">

    <!-- Logo -->
    <div class="logo-box">
        <img src="LOGO.jpg" alt="Origin Guess Logo">
    </div>

    <!-- Tagline -->
    <p class="tagline">
    10 rounds. AI or Real.<br>
    Can you spot the OG?
    </p>

    <div class="divider"></div>
    
    <!-- Main Buttons -->
    <div class="buttons" id="main-buttons">

        <button id="play-btn" class="btn play">PLAY NOW</button>

        <a href="leaderboard.html" class="btn">Leaderboard</a>

        <a href="learn.html" class="btn">Learn About AI</a>

        <a href="about.html" class="btn">About</a>

    </div>

    <div id="difficulty-menu" class="hidden">

        <h2>Select Difficulty</h2>

        <div class="difficulty-buttons">

            <a href="game.html?difficulty=easy" class="btn">Easy</a>

            <a href="game.html?difficulty=medium" class="btn">Medium</a>

            <a href="game.html?difficulty=hard" class="btn">Hard</a>

        </div>

        <!-- Back Button -->
        <button id="back-btn" class="btn" style="margin-top:20px;">← Back</button>

    </div>

</div>

<!-- Footer -->
<footer>
Origin Guess, 2026
</footer>

<script>

document.addEventListener("DOMContentLoaded", function() {

const playBtn = document.getElementById("play-btn");
const backBtn = document.getElementById("back-btn");
const mainButtons = document.getElementById("main-buttons");
const difficultyMenu = document.getElementById("difficulty-menu");

// PLAY NOW CLICK
playBtn.addEventListener("click", () => {

mainButtons.classList.add("fade-out");

setTimeout(() => {

mainButtons.style.display = "none";

difficultyMenu.classList.remove("hidden");
difficultyMenu.classList.add("fade-in");

}, 400);

});

// BACK BUTTON CLICK
backBtn.addEventListener("click", () => {

difficultyMenu.classList.add("fade-out");

setTimeout(() => {

difficultyMenu.classList.add("hidden");
difficultyMenu.style.display = "flex";

mainButtons.style.display = "flex";
mainButtons.classList.remove("fade-out");
mainButtons.classList.add("fade-in");

}, 400);

});

});

</script>

</body>
</html>
